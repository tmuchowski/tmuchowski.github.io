baseURL = 'https://www.muchowski-advisory.pl/'
title = 'Tomasz Muchowski Advisory'
theme = 'PaperMod'
relativeURLs = true
canonifyURLs = true
defaultContentLanguage = 'pl'
defaultContentLanguageInSubdir = false
env = 'production'

[params]
  defaultTheme = "light"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowCodeCopyButtons = true
  ShowBreadCrumbs = true          # Włączona nawigacja dla struktury analiz
  ShowPostNavLinks = true         # Ułatwia nawigowanie między analizami
  description = "Niezależne analizy finansowe"
  author = "Tomasz Muchowski, CIIA"

  [params.assets]
    disableFingerprinting = false

[languages]
  [languages.pl]
    label = "Polski"
    locale = "pl"
    contentDir = "content/pl"
    weight = 1
    [[languages.pl.menu.main]]
      name = "O mnie"
      url = "/about/"
      weight = 1
    [[languages.pl.menu.main]]
      name = "Analizy"
      url = "/analizy/"
      weight = 2
    [[languages.pl.menu.main]]
      name = "Komentarze"
      url = "/komentarze/"
      weight = 3
    [[languages.pl.menu.main]]
      name = "Kontakt"
      url = "/kontakt/"
      weight = 4

  [languages.en]
    label = "English"
    locale = "en"
    contentDir = "content/en"
    weight = 2
    [[languages.en.menu.main]]
      name = "About"
      url = "/about/"
      weight = 1
    [[languages.en.menu.main]]
      name = "Analyses"
      url = "/analyses/"
      weight = 2
    [[languages.en.menu.main]]
      name = "Comments"
      url = "/comments/"
      weight = 3
    [[languages.en.menu.main]]
      name = "Contact"
      url = "/contact/"
      weight = 4

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
